<!-- ===================================== -->
<!-- ngOnChanges Example -->
<!-- ===================================== -->

<h3>Employee Details</h3>

<!-- Display complete employee object -->
{{ employeeData | json }}

<!-- 
ngOnChanges()
Triggers whenever @Input() value changes
Example:
Parent changes employeeId -> Child receives new data
-->


<!-- ===================================== -->
<!-- ngDoCheck Example -->
<!-- ===================================== -->

<hr>

<h2>Employee Details</h2>

<p>Name: {{ employee.name }}</p>
<p>Role: {{ employee.role }}</p>

<!-- Button changes nested object property -->
<button (click)="changeName()">
    Change Name
</button>

<!-- 
ngDoCheck()
Used for custom change detection.

Angular may not detect nested object changes automatically,
so ngDoCheck helps track manual changes.
-->


<!-- ===================================== -->
<!-- ngAfterViewInit / ngAfterViewChecked -->
<!-- ===================================== -->

<hr>

<h3>Child Component</h3>

<p>{{ message }}</p>

<p>{{ messageForParent }}</p>

<!-- 
ngAfterViewInit()
Runs once after component view loads.

ngAfterViewChecked()
Runs every time component view updates/checks.
-->


<!-- ===================================== -->
<!-- ngAfterContentInit / ngAfterContentChecked -->
<!-- ===================================== -->

<hr>

<div class="card">

    <h3>Card Component</h3>

    <!-- Projected content from parent -->
    <ng-content></ng-content>

</div>

<!-- 
ngAfterContentInit()
Runs once after projected content loads.

ngAfterContentChecked()
Runs whenever projected content changes/checks.
-->
